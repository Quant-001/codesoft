services:
  backend:
    build:
      context: ./backend
    ports:
      - "8765:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://127.0.0.1:8765
    ports:
      - "5174:5173"
    depends_on:
      backend:
        condition: service_healthy
