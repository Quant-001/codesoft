services:
  - type: web
    name: credit-fraud-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: FRAUD_DECISION_THRESHOLD
        value: "0.55"
      - key: CORS_ORIGINS
        sync: false
